  <style>
    :root {
      --alef-orange: #CA4C28;
      --alef-charcoal: #27292B;
      --alef-light: #FFFAEC;
      --alef-mist: #F5EEDB;
      --font-display: 'Space Grotesk', -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font-display);
      background: var(--alef-light);
      color: var(--alef-charcoal);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 32px;
      -webkit-font-smoothing: antialiased;
    }
    a { text-decoration: none; color: inherit; }
    img { display: block; }
    .brief__logo img { height: 30px; width: auto; margin-bottom: 56px; }
    .brief__label {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--alef-orange);
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      line-height: 1.6;
      color: rgba(42, 42, 42, 0.7);
      max-width: 480px;
      margin-bottom: 40px;
    }
    .brief__back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--alef-orange);
      border: 1.5px solid rgba(202, 76, 40, 0.35);
      padding: 12px 26px;
      border-radius: 9px;
      transition: all 0.2s;
    }
    .brief__back:hover { background: rgba(202, 76, 40, 0.07); border-color: var(--alef-orange); }
